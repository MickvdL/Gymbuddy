<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Gymbuddy — Schedule</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="schedule-screen">

    <!-- Logo -->
 <div class="goal-logo"><img src="./images/Logo-blue.svg" alt="Gymbuddy"></div>

    <!-- Title row -->
    <div class="schedule-title-row">
      <h1 class="schedule-title">Full body split</h1>
      <button class="btn-edit" onclick="window.location.href='goalscreen.html'">
        Edit
        <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
    </div>

    <!-- Exercise list -->
    <div class="exercise-list">

      <div class="exercise-item">
        <span class="exercise-number">1</span>
        <div class="exercise-info">
          <span class="exercise-name">Dumbbells Hammer Curls</span>
          <span class="exercise-muscles">Biceps, Brachiallis</span>
        </div>
        <span class="exercise-reps">3 × 12</span>
      </div>

      <div class="exercise-item">
        <span class="exercise-number">2</span>
        <div class="exercise-info">
          <span class="exercise-name">Deadlift</span>
          <span class="exercise-muscles">Lower back, glutes, hamstrings</span>
        </div>
        <span class="exercise-reps">4 × 8</span>
      </div>

      <div class="exercise-item">
        <span class="exercise-number">3</span>
        <div class="exercise-info">
          <span class="exercise-name">Lat Pulldown</span>
          <span class="exercise-muscles">Lats, biceps, upper back</span>
        </div>
        <span class="exercise-reps">3 × 10</span>
      </div>

      <div class="exercise-item">
        <span class="exercise-number">4</span>
        <div class="exercise-info">
          <span class="exercise-name">Squat</span>
          <span class="exercise-muscles">Quads, glutes, core</span>
        </div>
        <span class="exercise-reps">4 × 10</span>
      </div>

      <div class="exercise-item">
        <span class="exercise-number">5</span>
        <div class="exercise-info">
          <span class="exercise-name">Overhead Press</span>
          <span class="exercise-muscles">Shoulders, triceps, upper chest</span>
        </div>
        <span class="exercise-reps">3 × 10</span>
      </div>

    </div>

    <!-- Start button -->
    <button class="btn-prim" onclick="window.location.href='video.html'">Start</button>

  </div>
</body>
</html>
