<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <div class="header">
    <h2>Hammer Curl</h2>
  </div>

  <div class="controls">
    <button class="btn-primary" id="startBtn" onclick="toggle()">▶ Start camera</button>
    <button class="btn-secondary" onclick="resetAll()">↺ Reset</button>

  </div>

  <div class="cam-wrap">
    <div class="placeholder" id="placeholder">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      <span style="font-weight:500;color:#555">Tap to start</span>
      <span style="font-size:12px;color:#fff;background:#0059FF;padding:4px 10px;border-radius:20px;margin-top:4px">📐 Face the camera directly for best results</span>
    </div>
    <video id="input" playsinline></video>
    <canvas id="output"></canvas>
    <div class="toast-wrap">
      <div class="toast hidden" id="toast">
        <span class="toast-icon" id="toastIcon"></span>
        <div class="toast-body">
          <div class="toast-title" id="toastTitle"></div>
          <div class="toast-msg" id="toastMsg"></div>
        </div>
      </div>
    </div>
    <div id="countdown-overlay" style="display:none;position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:88%;background:#0059FF;border-radius:20px;padding:18px 20px;text-align:center;z-index:20;">
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;">
        <span style="font-size:20px;">😊</span>
        <span style="color:white;font-size:15px;font-weight:600;">Get in position please</span>
      </div>
      <div id="countdown-number" style="color:white;font-size:52px;font-weight:700;line-height:1;">8</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="lbl">Reps L</div><div class="val" id="repL">0</div></div>
    <div class="stat"><div class="lbl">Reps R</div><div class="val" id="repR">0</div></div>
    <div class="stat"><div class="lbl">Angle L</div><div class="val" id="angL">—</div></div>
    <div class="stat"><div class="lbl">Angle R</div><div class="val" id="angR">—</div></div>
  </div>

  <div class="queue-bar">
    <span class="ql">Active issues:</span>
    <div class="queue-dots" id="queueDots"><span style="font-size:12px;color:#aaa">None</span></div>
    <div style="font-size:11px;color:#aaa;margin-top:4px;display:flex;gap:10px">
      <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#00B925;display:inline-block"></span>Good</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#FDC700;display:inline-block"></span>Warning</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#FF6B00;display:inline-block"></span>Error</span>
    </div>
  </div>

  <div class="log-list" id="logList" style="display:none"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
<script>
const video=document.getElementById('input');
const canvas=document.getElementById('output');
const ctx=canvas.getContext('2d');

let running=false,camera=null,pose=null;
let repsL=0,repsR=0,stateL='down',stateR='down';
let shoulderYHistory=[],angLHistory=[],angRHistory=[];
const HIST=10;
let activeIssues={};
let toastActive=false,toastTimer=null;
const TOAST_DURATION=2500,ISSUE_TIMEOUT=3000,SAME_KEY_GAP=8000;
let lastToastKey=null,lastToastTime=0;
let sessionGoodCount=0,sessionWarnCount=0,sessionBadCount=0;
let sessionFeedbackItems=[],sessionStartTime=null;
let countingActive=false;
let countdownTimer=null;

function reportIssue(key,type,title,msg,priority){
  activeIssues[key]={type,title,msg,priority,lastSeen:Date.now()};
}
function clearIssue(key){ delete activeIssues[key]; }

function tickFeedback(){
  const now=Date.now();
  Object.keys(activeIssues).forEach(k=>{ if(now-activeIssues[k].lastSeen>ISSUE_TIMEOUT) delete activeIssues[k]; });
  updateQueueDots();
  if(toastActive) return;
  const sorted=Object.entries(activeIssues).sort((a,b)=>a[1].priority-b[1].priority);
  if(!sorted.length) return;
  let chosen=sorted.find(([k])=>!(k===lastToastKey&&now-lastToastTime<SAME_KEY_GAP));
  if(!chosen) return;
  showToastEl(...chosen);
}

function showToastEl(key,issue){
  toastActive=true; lastToastKey=key; lastToastTime=Date.now();
  const el=document.getElementById('toast');
  // SVG icons matching design
  const checkIcon = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="9,12 11,14 15,10"/></svg>`;
  const warnIcon  = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="13"/><circle cx="12" cy="16.5" r="1" fill="white"/></svg>`;
  const icons = { good: checkIcon, warn: warnIcon, bad: warnIcon };
  document.getElementById('toastIcon').innerHTML = icons[issue.type] || warnIcon;
  document.getElementById('toastTitle').textContent=issue.title;
  document.getElementById('toastMsg').textContent=issue.msg;
  el.className='toast '+issue.type;
  addLog(issue.type,issue.msg,issue.title);
  document.querySelectorAll('.check').forEach(c=>c.classList.remove('active'));
  const card=document.getElementById('chk-'+key.split('_')[0]);
  if(card) card.classList.add('active');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{
    el.classList.add('hidden');
    toastActive=false;
    document.querySelectorAll('.check').forEach(c=>c.classList.remove('active'));
  },TOAST_DURATION);
}

function updateQueueDots(){
  const wrap=document.getElementById('queueDots');
  const issues=Object.values(activeIssues);
  if(!issues.length){ wrap.innerHTML='<span style="font-size:12px;color:#aaa">None</span>'; return; }
  wrap.innerHTML=issues.sort((a,b)=>a.priority-b.priority).map(i=>`<div class="qdot ${i.type}" title="${i.msg}"></div>`).join('');
}

setInterval(tickFeedback,500);

function angle3(a,b,c){
  const ab={x:a.x-b.x,y:a.y-b.y},cb={x:c.x-b.x,y:c.y-b.y};
  const dot=ab.x*cb.x+ab.y*cb.y;
  const mag=Math.sqrt(ab.x**2+ab.y**2)*Math.sqrt(cb.x**2+cb.y**2);
  return Math.round(Math.acos(Math.max(-1,Math.min(1,dot/mag)))*180/Math.PI);
}
function setCheck(id,type,val){}
function drawBone(a,b,color,w=3){
  ctx.beginPath();
  ctx.moveTo(a.x*canvas.width,a.y*canvas.height);
  ctx.lineTo(b.x*canvas.width,b.y*canvas.height);
  ctx.strokeStyle=color;ctx.lineWidth=w;ctx.stroke();
}
function drawDot(p,color,r=7){
  ctx.beginPath();
  ctx.arc(p.x*canvas.width,p.y*canvas.height,r,0,2*Math.PI);
  ctx.fillStyle=color;ctx.fill();
}
function drawLabel(p,text,ox=10,oy=-8){
  const x=p.x*canvas.width+ox,y=p.y*canvas.height+oy;
  ctx.fillStyle='rgba(0,0,0,0.65)';
  ctx.beginPath();ctx.roundRect(x,y,text.length*8+10,22,5);ctx.fill();
  ctx.fillStyle='white';ctx.font='bold 12px system-ui';
  ctx.fillText(text,x+5,y+15);
}
function addLog(type,msg,title=''){
  const list=document.getElementById('logList');
  const ph=list.querySelector('div:not(.log-item)');
  if(ph) ph.remove();
  const now=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const item=document.createElement('div');
  item.className='log-item '+type;
  item.innerHTML=`<span>${msg}</span><span class="ts">${now}</span>`;
  list.insertBefore(item,list.firstChild);
  if(list.children.length>15) list.lastChild.remove();
  if(title&&title!=='Klaar!'){
    const elapsed=sessionStartTime?Math.floor((Date.now()-sessionStartTime)/1000):0;
    sessionFeedbackItems.push({type,title,msg,elapsed});
    if(type==='good') sessionGoodCount++;
    else if(type==='warn') sessionWarnCount++;
    else if(type==='bad') sessionBadCount++;
  }
}

function onResults(results){
  canvas.width=results.image.width;
  canvas.height=results.image.height;
  const SCALE=0.65,tx=canvas.width*(1-SCALE)/2,ty=canvas.height*(1-SCALE)/2;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();ctx.translate(tx,ty);ctx.scale(SCALE,SCALE);ctx.drawImage(results.image,0,0);
  if(!results.poseLandmarks||!countingActive){ctx.restore();return;}
  const lm=results.poseLandmarks;
  const SL=lm[11],SR=lm[12],EL=lm[13],ER=lm[14],WL=lm[15],WR=lm[16];
  const HL=lm[23],HR=lm[24],earL=lm[7],earR=lm[8];

  const faint='rgba(255,255,255,0.18)';
  [[SL,SR],[SL,HL],[SR,HR],[HL,HR]].forEach(([a,b])=>drawBone(a,b,faint,2));

  const angL=angle3(SL,EL,WL),angR=angle3(SR,ER,WR);
  angLHistory.push(angL);if(angLHistory.length>HIST)angLHistory.shift();
  angRHistory.push(angR);if(angRHistory.length>HIST)angRHistory.shift();

  const colL=angL<65?'#00B925':angL>150?'#aaa':'#0059FF';
  const colR=angR<65?'#00B925':angR>150?'#aaa':'#0059FF';
  drawBone(SL,EL,colL,4);drawBone(EL,WL,colL,4);
  drawBone(SR,ER,colR,4);drawBone(ER,WR,colR,4);
  drawDot(EL,colL);drawDot(ER,colR);
  drawLabel(EL,angL+'°');drawLabel(ER,angR+'°');

  const angLEl=document.getElementById('angL');
  angLEl.textContent=angL+'°';angLEl.className='val '+(angL<70?'good':angL>150?'':'warn');
  const angREl=document.getElementById('angR');
  angREl.textContent=angR+'°';angREl.className='val '+(angR<70?'good':angR>150?'':'warn');

  if(countingActive){
    if(stateL==='down'&&angL<55){stateL='up';}
    else if(stateL==='up'&&angL>145){stateL='down';repsL++;document.getElementById('repL').textContent=repsL;
      reportIssue('rep_l','good','Great technique!','You keep your body straight and only move with your arms.',3);}
    if(stateR==='down'&&angR<55){stateR='up';}
    else if(stateR==='up'&&angR>145){stateR='down';repsR++;document.getElementById('repR').textContent=repsR;
      reportIssue('rep_r','good','Great technique!','You keep your body straight and only move with your arms.',3);}
  }

  const driftL=EL.x-SL.x,driftR=SR.x-ER.x;
  if(driftL>0.12||driftR>0.12){setCheck('elbow','bad','');reportIssue('elbow','bad','Elbow drifting forward','Keep your elbow fixed at your side — only move your forearm.',1);}
  else{setCheck('elbow','good','');clearIssue('elbow');}

  const smY=(SL.y+SR.y)/2;
  shoulderYHistory.push(smY);if(shoulderYHistory.length>14)shoulderYHistory.shift();
  if(shoulderYHistory.length>=8){
    const yR=Math.max(...shoulderYHistory)-Math.min(...shoulderYHistory);
    if(yR>0.06){setCheck('swing','bad','');reportIssue('swing','bad','Too much body swing','Keep your torso still — the power should come from your arm, not your shoulder.',1);}
    else if(yR>0.035){setCheck('swing','warn','');reportIssue('swing','warn','Slight body movement','Try to keep your torso a little steadier for a better movement.',2);}
    else{setCheck('swing','good','');clearIssue('swing');}
  }

  const smX=(SL.x+SR.x)/2,hmX=(HL.x+HR.x)/2,hmY=(HL.y+HR.y)/2;
  const leanX=Math.abs(smX-hmX);
  const tc=leanX>0.07?'#FF6B00':leanX>0.04?'#FDC700':'#00B925';
  drawBone({x:smX,y:smY},{x:hmX,y:hmY},tc,5);
  if(leanX>0.07){setCheck('back','bad','');reportIssue('back','bad','Back is leaning','Keep your back straight — do not lean forward or backward during the curl.',1);}
  else if(leanX>0.04){setCheck('back','warn','');reportIssue('back','warn','Slightly leaning forward','Try to straighten your back a little more for better posture.',2);}
  else{setCheck('back','good','');clearIssue('back');}

  const sfL=earL.x-SL.x,sfR=SR.x-earR.x,hDiff=Math.abs(SL.y-SR.y);
  if(sfL>0.07||sfR>0.07){setCheck('shoulder','bad','');reportIssue('shoulder','bad','Shoulders rolling forward','Pull your shoulders back and keep them low during the movement.',1);}
  else if(sfL>0.04||sfR>0.04||hDiff>0.045){setCheck('shoulder','warn','');reportIssue('shoulder','warn',hDiff>0.045?'Uneven shoulders':'Shoulders slightly forward',hDiff>0.045?'Keep both shoulders at the same height.':'Pull your shoulders back slightly for a more stable posture.',2);}
  else{setCheck('shoulder','good','');clearIssue('shoulder');}

  if(angLHistory.length>=6){
    const dL=angLHistory[angLHistory.length-1]-angLHistory[angLHistory.length-6];
    const dR=angRHistory[angRHistory.length-1]-angRHistory[angRHistory.length-6];
    if(dL>65||dR>65){
      const side=dL>65&&dR>65?'both arms':dL>65?'left arm':'right arm';
      setCheck('speed','bad','');
      reportIssue('speed','bad','Too fast on the way down','Lower the weight in a controlled way — the eccentric phase is just as important.',1);
    } else if(dL>45||dR>45){setCheck('speed','warn','');reportIssue('speed','warn','Slightly too fast','Try to slow down the movement a little for more muscle activation.',2);}
    else{setCheck('speed','good','');clearIssue('speed');}
  }

  const diff=Math.abs(angL-angR);
  if(diff>30){setCheck('sym','bad','');reportIssue('sym','warn','Arms out of sync','There is a '+diff+'° difference between left and right — try to move both arms evenly.',2);}
  else if(diff>15){setCheck('sym','warn','');clearIssue('sym');}
  else{setCheck('sym','good','');clearIssue('sym');}

  ctx.restore();
}

async function toggle(){
  const btn=document.getElementById('startBtn');
  if(running){
    running=false;
    countingActive=false;
    if(countdownTimer){clearInterval(countdownTimer);countdownTimer=null;}
    document.getElementById('countdown-overlay').style.display='none';
    if(camera) camera.stop();
    document.getElementById('placeholder').style.display='flex';
    canvas.style.display='none';btn.textContent='▶ Start camera';
    showResults();return;
  }
  sessionGoodCount=0;sessionWarnCount=0;sessionBadCount=0;sessionFeedbackItems=[];sessionStartTime=Date.now();
  btn.textContent='⏳ Loading...';btn.disabled=true;
  pose=new Pose({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`});
  pose.setOptions({modelComplexity:0,smoothLandmarks:true,minDetectionConfidence:0.6,minTrackingConfidence:0.5});
  pose.onResults(onResults);
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    video.srcObject=stream;await video.play();
    // Try to zoom out for a wider field of view (activates ultrawide on iPhone)
    try{const track=stream.getVideoTracks()[0];await track.applyConstraints({advanced:[{zoom:0.5}]});}catch(e){}
    countingActive=false;
    camera=new Camera(video,{onFrame:async()=>{await pose.send({image:video});},width:480,height:854});
    await camera.start();
    document.getElementById('placeholder').style.display='none';
    canvas.style.display='block';running=true;
    btn.textContent='⏹ Stop';btn.disabled=false;
    // countdown — pose runs so you can see yourself, reps don't count yet
    let count=4;
    const overlay=document.getElementById('countdown-overlay');
    const numEl=document.getElementById('countdown-number');
    overlay.style.display='block';
    numEl.textContent=count;
    countdownTimer=setInterval(()=>{
      count--;
      numEl.textContent=count;
      if(count<=0){
        clearInterval(countdownTimer);
        overlay.style.display='none';
        countingActive=true;
        reportIssue('start','good','Ready!','Camera is active — start your hammer curls!',3);
      }
    },1000);
  }catch(e){
    btn.textContent='▶ Start camera';btn.disabled=false;
    reportIssue('cam_err','bad','Error','Camera access denied — check your browser settings.',1);
  }
}

function showResults(){
  localStorage.setItem('hammerResults',JSON.stringify({
    repsL,repsR,
    sessionGoodCount,sessionWarnCount,sessionBadCount,
    sessionFeedbackItems
  }));
  window.location.href='results.html';
}

function resetAll(){
  repsL=0;repsR=0;stateL='down';stateR='down';
  shoulderYHistory=[];angLHistory=[];angRHistory=[];activeIssues={};
  document.getElementById('repL').textContent='0';
  document.getElementById('repR').textContent='0';
  document.getElementById('angL').textContent='—';
  document.getElementById('angR').textContent='—';
  document.getElementById('logList').innerHTML='';
  document.getElementById('toast').className='toast hidden';
  toastActive=false;
}
</script>

</body>
</html>
