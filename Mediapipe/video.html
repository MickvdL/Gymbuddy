<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Gymbuddy — Hammer Curl Video</title>
  <link rel="stylesheet" href="style.css">
  <style>
    html, body { height: 100%; }
    .page { height: 100vh; overflow: hidden; }
    .vid-wrap {
      position: relative;
      width: 100%;
      flex: 1;
      min-height: 0;
      background: #111;
      overflow: hidden;
    }
    .vid-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .vid-controls {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 10;
    }
    .vid-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(6px);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .vid-btn svg { width: 18px; height: 18px; }
    .vid-scrubber {
      flex: 1;
      height: 20px;
      display: flex;
      align-items: center;
      cursor: pointer;
      touch-action: none;
      position: relative;
    }
    .vid-scrubber-track {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 4px;
      position: relative;
      pointer-events: none;
    }
    .vid-progress {
      height: 100%;
      background: #fff;
      border-radius: 4px;
      width: 0%;
    }
    .vid-time {
      font-size: 12px;
      color: rgba(255,255,255,0.85);
      font-weight: 500;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- Header -->
    <div class="page-header">
      <button class="btn-close" onclick="history.back()">✕</button>
      <div class="page-header-info">
        <span class="page-header-title">Hammer curl</span>
        <span class="page-header-sub">Biceps, brachialis, brachioradialis</span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Video -->
    <div class="vid-wrap">
      <video id="vid" playsinline>
        <source src="./images/instructionvideo.mp4" type="video/mp4">
      </video>
      <div class="vid-controls">
        <button class="vid-btn" id="playBtn" onclick="togglePlay()">
          <svg viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="vid-scrubber" id="scrubber">
          <div class="vid-scrubber-track">
            <div class="vid-progress" id="progress"></div>
          </div>
        </div>
        <span class="vid-time" id="timeLabel">0:00</span>
      </div>
    </div>

    <!-- CTA — witte balk -->
    <div class="btn-bar">
      <button class="btn-next" onclick="window.location.href='instructions.html'">Next</button>
    </div>

  </div>

<script>
  const vid = document.getElementById('vid');
  const playBtn = document.getElementById('playBtn');
  const progress = document.getElementById('progress');
  const timeLabel = document.getElementById('timeLabel');
  const scrubber = document.getElementById('scrubber');

  const playIcon  = `<svg viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>`;
  const pauseIcon = `<svg viewBox="0 0 24 24" fill="white"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>`;

  vid.addEventListener('timeupdate', () => {
    if (!vid.duration) return;
    progress.style.width = (vid.currentTime / vid.duration * 100) + '%';
    const s = Math.floor(vid.currentTime % 60);
    const m = Math.floor(vid.currentTime / 60);
    timeLabel.textContent = `${m}:${String(s).padStart(2,'0')}`;
  });

  vid.addEventListener('play',  () => playBtn.innerHTML = pauseIcon);
  vid.addEventListener('pause', () => playBtn.innerHTML = playIcon);
  vid.addEventListener('ended', () => playBtn.innerHTML = playIcon);

  function togglePlay() { vid.paused ? vid.play() : vid.pause(); }

  function seekTo(e) {
    const rect = scrubber.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    if (vid.duration) vid.currentTime = pct * vid.duration;
  }

  let dragging = false;
  scrubber.addEventListener('mousedown',  e => { dragging = true; seekTo(e); });
  scrubber.addEventListener('touchstart', e => { dragging = true; seekTo(e); }, {passive:true});
  window.addEventListener('mousemove',  e => { if (dragging) seekTo(e); });
  window.addEventListener('touchmove',  e => { if (dragging){ e.preventDefault(); seekTo(e); } }, {passive:false});
  window.addEventListener('mouseup',   () => dragging = false);
  window.addEventListener('touchend',  () => dragging = false);

  vid.play();
</script>
</body>
</html>
